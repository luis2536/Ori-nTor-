name: High-Performance Native CI/CD

on:
  push:
    branches: [ "main", "master", "release/*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Native Build & Optimize (Syntropy Delta Labs)
    runs-on: ubuntu-24.04 # Latest LTS for better performance

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for accurate versioning

    - name: Setup JDK 17 (Temurin)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle # Built-in gradle caching

    - name: Configure Gradle JVM Arguments
      run: |
        # Optimize JVM for Gradle Daemon
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
        echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
        echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties

    - name: Generate Secure CI Environment
      run: |
        cp .env.example .env
        echo "KEYSTORE_PATH=" >> .env
        echo "STORE_PASSWORD=" >> .env
        echo "KEY_PASSWORD=" >> .env
        echo "KEY_ALIAS=" >> .env

    - name: Initialize Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          tr -d '\r\n ' < debug.keystore.base64 | base64 -d > debug.keystore
        else
          echo "debug.keystore.base64 not found, generating a new one..."
          keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
        fi

    - name: Ensure Executable Permissions
      run: chmod +x gradlew

    - name: Compile Optimized Native Release (AAB)
      run: ./gradlew bundleRelease --no-daemon --parallel -Pbuild_type=release
      continue-on-error: true # Will succeed if signed, otherwise falls back to debug/unsigned

    - name: Compile Optimized Native Release (APK)
      run: ./gradlew assembleRelease --no-daemon --parallel -Pbuild_type=release
      continue-on-error: true

    - name: Compile Debug APK (Verification)
      run: ./gradlew assembleDebug --no-daemon --parallel
      
    - name: Upload High-Performance Artifacts (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Syntropy-Native-APK
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn

    - name: Upload High-Performance Artifacts (AAB)
      uses: actions/upload-artifact@v4
      with:
        name: Syntropy-Native-AAB
        path: app/build/outputs/bundle/release/*.aab
        if-no-files-found: ignore
