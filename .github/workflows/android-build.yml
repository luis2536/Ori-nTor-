name: Android CI/CD Pipeline

# Build workflow updated for Syntropy Delta Labs
# Ensures correct zero-trust CI compilation without local keystore dependencies

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Verify (Syntropy Delta Labs)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create mock .env for CI
      run: |
        echo "KEYSTORE_PATH=" > .env
        echo "STORE_PASSWORD=" >> .env
        echo "KEY_PASSWORD=" >> .env
        echo "KEY_ALIAS=" >> .env

    - name: Generate debug keystore
      run: |
        if [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK (Verification & Testing)
      run: ./gradlew assembleDebug --no-daemon

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      continue-on-error: true # Evita que el pipeline falle si las llaves Keystore aún no están en los Secrets de GitHub

    - name: Build Release AAB
      run: ./gradlew bundleRelease --no-daemon
      continue-on-error: true

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/bundle/release/*.aab
        if-no-files-found: warn
